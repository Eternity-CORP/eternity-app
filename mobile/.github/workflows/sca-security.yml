name: SCA & Supply Chain Security

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        run: |
          echo "Running npm audit..."
          npm audit --audit-level=moderate --json > npm-audit-report.json || true

          # Extract critical and high vulnerabilities
          CRITICAL=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.high // 0')
          MODERATE=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.moderate // 0')
          LOW=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.low // 0')

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT

          echo "### NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Critical**: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- **High**: $HIGH" >> $GITHUB_STEP_SUMMARY
          echo "- **Moderate**: $MODERATE" >> $GITHUB_STEP_SUMMARY
          echo "- **Low**: $LOW" >> $GITHUB_STEP_SUMMARY

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

      - name: Check severity policy
        run: |
          CRITICAL=${{ steps.npm_audit.outputs.critical }}
          HIGH=${{ steps.npm_audit.outputs.high }}

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ CRITICAL vulnerabilities found: $CRITICAL"
            echo "This violates the security policy. Please fix immediately!"
            exit 1
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "⚠️  HIGH vulnerabilities found: $HIGH"
            echo "Please address these vulnerabilities as soon as possible."
            # For production branches, fail on HIGH
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "❌ HIGH vulnerabilities are not allowed in main branch"
              exit 1
            fi
          fi

          echo "✅ No critical or high vulnerabilities found"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Run license check
        id: license_check
        run: |
          echo "Running license compliance check..."

          # Generate license report
          license-checker --json --out license-report.json || true
          license-checker --summary > license-summary.txt || true

          # Check for non-compliant licenses
          # Whitelist: MIT, Apache-2.0, BSD*, ISC, CC0-1.0, Unlicense, 0BSD
          license-checker --failOn "GPL;AGPL;LGPL;SSPL;CC-BY-SA" --summary || {
            echo "❌ Non-compliant licenses found!"
            cat license-summary.txt
            exit 1
          }

          echo "✅ All licenses are compliant"
          echo "### License Summary" >> $GITHUB_STEP_SUMMARY
          cat license-summary.txt >> $GITHUB_STEP_SUMMARY

      - name: Generate NOTICE file
        run: |
          echo "Generating NOTICE file..."
          node -e "
          const fs = require('fs');
          const licenses = JSON.parse(fs.readFileSync('license-report.json', 'utf8'));

          let notice = '# NOTICE\\n\\n';
          notice += 'Eternity Wallet Mobile Application\\n';
          notice += 'Copyright (c) 2025 Eternity Wallet Team\\n\\n';
          notice += 'This product includes software developed by third parties:\\n\\n';

          Object.entries(licenses).forEach(([pkg, info]) => {
            notice += \`## \${pkg}\\n\`;
            notice += \`License: \${info.licenses || 'UNKNOWN'}\\n\`;
            if (info.repository) notice += \`Repository: \${info.repository}\\n\`;
            if (info.licenseFile) {
              try {
                const licenseText = fs.readFileSync(info.licenseFile, 'utf8');
                notice += \`\\n\${licenseText.substring(0, 500)}...\\n\`;
              } catch (e) {}
            }
            notice += '\\n---\\n\\n';
          });

          fs.writeFileSync('NOTICE.md', notice);
          console.log('✅ NOTICE file generated');
          " || echo "Warning: Could not generate full NOTICE file"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report
          path: |
            license-report.json
            license-summary.txt
            NOTICE.md
          retention-days: 90

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0, SSPL-1.0

  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' # Skip for scheduled runs if no Snyk token

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "⚠️  SNYK_TOKEN not set, skipping Snyk scan"
            echo "To enable Snyk scanning, add SNYK_TOKEN to repository secrets"
            exit 0
          fi

          npm install -g snyk
          snyk test --severity-threshold=high --json > snyk-report.json || true
          snyk test --severity-threshold=high || true

      - name: Upload Snyk report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 30

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SBOM (CycloneDX)
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-file sbom-cyclonedx.json
          echo "✅ SBOM generated in CycloneDX format"

      - name: Generate SBOM (SPDX)
        run: |
          npm install -g @microsoft/sbom-tool
          sbom-tool generate -b . -bc . -pn "Eternity-Wallet" -pv "1.0.0" -ps "Eternity" -nsb https://eternity.wallet || {
            echo "⚠️  SPDX SBOM generation failed, continuing..."
          }

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-cyclonedx.json
            _manifest/
          retention-days: 365

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [npm-audit, license-check]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate consolidated report
        run: |
          cat > security-report.md << 'EOF'
          # Security & Compliance Report

          **Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Branch**: ${{ github.ref_name }}
          **Commit**: ${{ github.sha }}

          ## NPM Audit Results

          EOF

          if [ -f npm-audit-report/npm-audit-report.json ]; then
            cat npm-audit-report/npm-audit-report.json | jq -r '
              "- **Critical**: \(.metadata.vulnerabilities.critical // 0)",
              "- **High**: \(.metadata.vulnerabilities.high // 0)",
              "- **Moderate**: \(.metadata.vulnerabilities.moderate // 0)",
              "- **Low**: \(.metadata.vulnerabilities.low // 0)"
            ' >> security-report.md
          else
            echo "No audit report available" >> security-report.md
          fi

          cat >> security-report.md << 'EOF'

          ## License Compliance

          EOF

          if [ -f license-report/license-summary.txt ]; then
            cat license-report/license-summary.txt >> security-report.md
          else
            echo "No license report available" >> security-report.md
          fi

          cat >> security-report.md << 'EOF'

          ## Verdict

          EOF

          echo "✅ Security scan completed. Review artifacts for details." >> security-report.md

      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 365

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
