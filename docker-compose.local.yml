# Lightweight compose for local development - just PostgreSQL
# Usage: docker-compose -f docker-compose.local.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ey-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ey_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ey_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ey}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
